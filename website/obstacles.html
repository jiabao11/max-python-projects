<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodge Game – Max's Projects</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d1a; color: #e8e8f0; font-family: 'Segoe UI', sans-serif;
         min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .back { align-self: flex-start; margin: 20px; text-decoration: none; color: #8888aa; font-size: 0.9rem; }
  .back:hover { color: #fd79a8; }
  .card { background: #1a1a3e; border: 1px solid #fd79a855; border-radius: 20px;
          padding: 24px; max-width: 620px; width: 92%; margin: 10px; text-align: center; }
  h1 { font-size: 1.8rem; margin-bottom: 6px; }
  .subtitle { color: #8888aa; margin-bottom: 16px; font-size: 0.9rem; }
  canvas { border-radius: 12px; border: 2px solid #2a2a5e; display: block; margin: 0 auto 16px; }
  .hud { display: flex; justify-content: space-around; margin-bottom: 16px; }
  .hud-box { background: #0d0d1a; border-radius: 10px; padding: 8px 18px; }
  .hud-val { font-size: 1.4rem; font-weight: 800; color: #fd79a8; }
  .hud-lbl { font-size: 0.75rem; color: #8888aa; }
  .lives-row { display: flex; gap: 4px; justify-content: center; }
  .heart { font-size: 1.2rem; transition: opacity 0.3s; }
  .heart.lost { opacity: 0.15; }
  .keys { color: #8888aa; font-size: 0.82rem; margin-top: 4px; }
  .keys span { color: #e8e8f0; background: #2a2a5e; padding: 2px 8px; border-radius: 6px; margin: 0 2px; }
  button {
    padding: 12px 32px; border-radius: 10px; border: none;
    background: #fd79a8; color: #0d0d1a; font-size: 1rem;
    font-weight: 700; cursor: pointer; transition: opacity 0.2s; margin-top: 12px;
  }
  button:hover { opacity: 0.85; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back to all projects</a>
<div class="card">
  <h1>🎮 Dodge Game</h1>
  <p class="subtitle">Dodge yellow obstacles · Collect green coins · Arrow keys to move</p>

  <div class="hud">
    <div class="hud-box"><div class="hud-val" id="scoreVal">0</div><div class="hud-lbl">SCORE</div></div>
    <div class="hud-box">
      <div class="lives-row" id="hearts"></div>
      <div class="hud-lbl" style="margin-top:4px">LIVES</div>
    </div>
    <div class="hud-box"><div class="hud-val" id="bestVal">0</div><div class="hud-lbl">BEST</div></div>
  </div>

  <canvas id="gameCanvas" width="560" height="360"></canvas>

  <div class="keys">Move: <span>↑</span><span>↓</span><span>←</span><span>→</span> or <span>W</span><span>A</span><span>S</span><span>D</span></div>
  <button id="startBtn" onclick="startGame()">▶ Start Game</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let player, obstacles, coin, score, lives, best = 0, gameOver, running, animFrame;
const PLAYER_R = 14, OBS_SIZE = 22, COIN_SIZE = 14, STEP = 22, MAX_LIVES = 3;

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if (e.key === 'r' || e.key === 'R') { if (gameOver) startGame(); }
});
document.addEventListener('keyup', e => keys[e.key] = false);

function randY() { return Math.random() * (H - 60) + 30; }
function randX() { return Math.random() * (W - 60) + 30; }

function mkObstacle(fromLeft) {
  return fromLeft
    ? { x: W + 30, y: randY(), dx: -(2 + Math.random() * 2), dy: 0, fromLeft: true }
    : { x: randX(), y: -30,   dx: 0, dy: (2 + Math.random() * 2), fromLeft: false };
}

function mkCoin() {
  return { x: randX(), y: randY() };
}

function startGame() {
  player = { x: 80, y: H / 2 };
  obstacles = [
    mkObstacle(true), mkObstacle(true), mkObstacle(true),
    mkObstacle(false), mkObstacle(false)
  ];
  coin = mkCoin();
  score = 0; lives = MAX_LIVES; gameOver = false; running = true;
  document.getElementById('startBtn').textContent = '↺ Restart';
  renderHearts();
  cancelAnimationFrame(animFrame);
  loop();
}

function renderHearts() {
  const h = document.getElementById('hearts');
  h.innerHTML = '';
  for (let i = 0; i < MAX_LIVES; i++) {
    const s = document.createElement('span');
    s.className = 'heart' + (i >= lives ? ' lost' : '');
    s.textContent = '❤️';
    h.appendChild(s);
  }
}

function loop() {
  update();
  draw();
  if (!gameOver) animFrame = requestAnimationFrame(loop);
}

let moveTimer = 0;
function update() {
  // Player movement (throttled)
  moveTimer++;
  if (moveTimer % 6 === 0) {
    if ((keys['ArrowUp']    || keys['w'] || keys['W']) && player.y > PLAYER_R + 4)  player.y -= STEP;
    if ((keys['ArrowDown']  || keys['s'] || keys['S']) && player.y < H - PLAYER_R - 4) player.y += STEP;
    if ((keys['ArrowLeft']  || keys['a'] || keys['A']) && player.x > PLAYER_R + 4)  player.x -= STEP;
    if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.x < W - PLAYER_R - 4) player.x += STEP;
  }

  // Move obstacles
  obstacles.forEach(o => {
    o.x += o.dx; o.y += o.dy;
    if (o.fromLeft && o.x < -40)  { o.x = W + 30; o.y = randY(); }
    if (!o.fromLeft && o.y > H + 40) { o.y = -30; o.x = randX(); }
  });

  // Collision with obstacles
  obstacles.forEach(o => {
    const dx = player.x - o.x, dy = player.y - o.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < PLAYER_R + OBS_SIZE * 0.8) {
      lives--;
      renderHearts();
      document.getElementById('scoreVal').textContent = score;
      if (lives <= 0) { endGame(); return; }
      // Reset player to safe spot
      player = { x: 80, y: H / 2 };
    }
  });

  // Coin collection
  const cdx = player.x - coin.x, cdy = player.y - coin.y;
  if (Math.sqrt(cdx*cdx + cdy*cdy) < PLAYER_R + COIN_SIZE) {
    score++;
    document.getElementById('scoreVal').textContent = score;
    coin = mkCoin();
  }
}

function draw() {
  // Background
  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#1e3e1e';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Coin
  ctx.beginPath();
  ctx.arc(coin.x, coin.y, COIN_SIZE, 0, Math.PI * 2);
  ctx.fillStyle = '#55efc4';
  ctx.fill();
  ctx.strokeStyle = '#00b894';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#0d2e1e';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', coin.x, coin.y);

  // Obstacles
  obstacles.forEach(o => {
    ctx.fillStyle = '#fdcb6e';
    ctx.strokeStyle = '#e17057';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(o.x - OBS_SIZE, o.y - OBS_SIZE, OBS_SIZE*2, OBS_SIZE*2, 4);
    ctx.fill(); ctx.stroke();
  });

  // Player (blue circle)
  ctx.beginPath();
  ctx.arc(player.x, player.y, PLAYER_R, 0, Math.PI * 2);
  ctx.fillStyle = '#74b9ff';
  ctx.fill();
  ctx.strokeStyle = '#0984e3';
  ctx.lineWidth = 2;
  ctx.stroke();

  if (gameOver) drawGameOver();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(13,13,26,0.82)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff6b6b';
  ctx.font = 'bold 48px Segoe UI';
  ctx.fillText('Game Over!', W/2, H/2 - 30);
  ctx.fillStyle = '#e8e8f0';
  ctx.font = '22px Segoe UI';
  ctx.fillText(`Score: ${score}`, W/2, H/2 + 16);
  ctx.fillStyle = '#8888aa';
  ctx.font = '16px Segoe UI';
  ctx.fillText('Press R or click Restart to play again', W/2, H/2 + 50);
}

function endGame() {
  gameOver = true;
  if (score > best) {
    best = score;
    document.getElementById('bestVal').textContent = best;
  }
}

// Draw initial screen
ctx.fillStyle = '#1a2a1a';
ctx.fillRect(0, 0, W, H);
ctx.fillStyle = '#e8e8f0';
ctx.font = 'bold 28px Segoe UI';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('Press Start to play!', W/2, H/2 - 14);
ctx.fillStyle = '#8888aa';
ctx.font = '16px Segoe UI';
ctx.fillText('Use arrow keys or WASD to move', W/2, H/2 + 24);
</script>
</body>
</html>
